
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Fool's Hand - Card Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>A Fool's Hand</h1>
            <p>Strategic Card Game</p>
        </header>

        <div class="game-info">
            <div class="info-item">
                <span>Round: <span id="current-round">1</span>/4</span>
            </div>
            <div class="info-item">
                <span>Current Player: <span id="current-player">Player 1</span></span>
            </div>
            <div class="info-item">
                <span>Scores - Player 1: <span id="player1-score">0</span> | AI: <span id="player2-score">0</span></span>
            </div>
        </div>

        <div class="fields-container" id="fields-container">
            <!-- Fields will be generated here -->
        </div>

        <div class="field-selection" id="field-selection" style="display: none;">
            <p>Select Field:</p>
            <div class="field-buttons" id="field-buttons">
                <!-- Field selection buttons will be generated here -->
            </div>
        </div>

        <div class="player-hand" id="player-hand">
            <h3>Your Hand</h3>
            <div class="hand-controls">
                <span>Switch Chances: <span id="switch-chances">5</span></span>
                <span>Cards: <span id="card-count">5</span></span>
            </div>
            <div class="cards-container" id="player-cards">
                <!-- Player cards will be generated here -->
            </div>
            <div class="hand-actions">
                <button id="switch-btn" class="btn-switch" disabled>Switch Selected Card</button>
            </div>
        </div>

        <div class="game-controls">
            <button id="place-cards-btn" class="btn-primary" disabled>Place Cards (0)</button>
            <button id="end-round-btn" class="btn-secondary">End Round</button>
            <button id="reset-game-btn" class="btn-danger">Reset Game</button>
        </div>

        <div class="game-over" id="game-over" style="display: none;">
            <h2>Game Over!</h2>
            <p id="winner-text"></p>
            <p>Final Scores:</p>
            <p id="final-scores"></p>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
