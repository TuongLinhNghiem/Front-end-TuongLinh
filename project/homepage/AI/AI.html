<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI and ML</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        .typing-container {
            text-align: center;
        }

        .typing-text {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .cursor {
            display: inline-block;
            background-color: #00ff00;
            margin-left: 3px;
            width: 3px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        .subtitle {
            font-size: 1.2em;
            opacity: 0;
            animation: fadeIn 1s ease-in-out 3s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .start-btn {
            background: transparent;
            border: 2px solid #00ff00;
            color: #00ff00;
            padding: 15px 30px;
            font-size: 1.2em;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin: 10px;
        }

        .start-btn:hover {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 20px #00ff00;
            transform: scale(1.05);
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px #00ff00; }
            to { text-shadow: 0 0 30px #00ff00, 0 0 40px #00ff00; }
        }
    </style>
</head>
<body>
    <div class="typing-container">
        <div class="typing-text" id="typing-text"></div>
        <div class="cursor" id="cursor">|</div>
        <div class="subtitle">Welcome to the future of web development</div>
        <a href="About.html" class="start-btn">About</a>
        <a href="Artificial Inteligence.html" class="start-btn">AI Prompt</a>
        <a href="Machine Learning.html" class="start-btn">ML</a>
        <a href="../index.html" class="start-btn">GO HOME</a>
    </div>

    <script>
        const text = "Hello, This is my AI and ML journey";
        const typingText = document.getElementById('typing-text');
        const cursor = document.getElementById('cursor');
        let index = 0;

        function typeWriter() {
            if (index < text.length) {
                typingText.innerHTML += text.charAt(index);
                index++;
                setTimeout(typeWriter, 100);
            }
        }

        typeWriter();
    </script>
</body>
</html>
