<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Egg Catcher</title>
        <style>
            body {
                margin: 0;
                padding: 0;
                background: radial-gradient(white,
                        rgba(255, 255, 128, 0.8),
                        rgba(80, 20, 0, 0.8));
                overflow: hidden;
                height: 100vh;
                font-family: Arial, sans-serif;
            }

            .particles {
                position: absolute;
                width: 100%;
                height: 100%;
            }

            .particle {
                position: absolute;
                background: rgba(255, 255, 255, 0.8);
                border-radius: 50%;
                animation: float 6s ease-in-out infinite;
            }

            @keyframes float {

                0%,
                100% {
                    transform: translateY(0px) rotate(0deg);
                }

                50% {
                    transform: translateY(-20px) rotate(180deg);
                }
            }

            .content {
                position: relative;
                z-index: 10;
                text-align: center;
                color: orange;
                padding-top: 15%;
            }

            h1 {
                font-size: 4em;
                margin-bottom: 20px;
                animation: glow 2s ease-in-out infinite alternate;
            }

            @keyframes glow {
                from {
                    text-shadow: 0 0 20px #fff, 0 0 30px #fff, 0 0 40px #fff;
                }

                to {
                    text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #fff;
                }
            }

            .subtitle {
                font-size: 1.5em;
                margin-bottom: 40px;
                opacity: 0.9;
            }

            .game-buttons {
                margin-top: 40px;
            }

            .btn {
                background: rgba(255, 255, 255, 0.2);
                border: 2px solid white;
                color: white;
                padding: 15px 30px;
                font-size: 1.2em;
                cursor: pointer;
                border-radius: 50px;
                margin: 10px;
                transition: all 0.3s ease;
                text-decoration: none;
                display: inline-block;
                backdrop-filter: blur(10px);
            }

            .btn:hover {
                background: rgba(255, 255, 255, 0.3);
                transform: translateY(-3px);
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            }

            .instructions {
                margin-top: 30px;
                font-size: 1.1em;
                opacity: 0.8;
                max-width: 600px;
                margin-left: auto;
                margin-right: auto;
            }

            .egg-icon {
                font-size: 2em;
                animation: bounce 2s infinite;
            }

            @keyframes bounce {

                0%,
                20%,
                50%,
                80%,
                100% {
                    transform: translateY(0);
                }

                40% {
                    transform: translateY(-10px);
                }

                60% {
                    transform: translateY(-5px);
                }
            }
        </style>
    </head>

    <body>
        <div class="particles" id="particles"></div>
        <div class="content">
            <div class="egg-icon">🥚</div>
            <h1>EGG CATCHER</h1>
            <p class="subtitle">Catch the falling eggs and save the day!</p>

            <div class="game-buttons">
                <a href="egg.html" class="btn">🎮 START GAME</a>
                <a href="../index.html" class="btn">🏠 GO HOME</a>
            </div>
        </div>

        <script>
            function createParticles() {
                const particlesContainer = document.getElementById('particles');
                const particleCount = 50;

                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';

                    const size = Math.random() * 5 + 2;
                    const x = Math.random() * window.innerWidth;
                    const y = Math.random() * window.innerHeight;
                    const delay = Math.random() * 6;

                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    particle.style.left = x + 'px';
                    particle.style.top = y + 'px';
                    particle.style.animationDelay = delay + 's';

                    particlesContainer.appendChild(particle);
                }
            }

            createParticles();

            // Recreate particles when window resizes
            window.addEventListener('resize', () => {
                document.getElementById('particles').innerHTML = '';
                createParticles();
            });
        </script>
    </body>

</html>
