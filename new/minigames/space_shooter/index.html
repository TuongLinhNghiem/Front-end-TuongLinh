
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Shooter</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 100%);
            font-family: Arial, sans-serif;
            color: white;
        }
        .game-container { text-align: center; }
        h1 { font-size: 3rem; margin-bottom: 20px; }
        button {
            background: #00ff88;
            color: #0c0c0c;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>\ud83d\ude80 Space Shooter</h1>
        <p>Placeholder for Space Shooter mini-game</p>
        <button onclick="completeGame()">Complete Game</button>
    </div>
    <script>
        function completeGame() {
            window.parent.postMessage({
                type: 'game_complete',
                data: { score: 200, won: true, enemies: 10 }
            }, '*');
        }
        window.addEventListener('message', (e) => {
            if (e.data.type === 'set_data') console.log('Data:', e.data);
        });
        window.parent.postMessage({ type: 'game_ready' }, '*');
    </script>
</body>
</html>
