<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoai Niem - Visual Novel</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/ui.css">
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <!-- Main Game Container -->
    <div id="game-container">
        
        <!-- Player Selection Screen -->
        <div id="player-selection" class="screen">
            <div class="selection-content">
                <h1>Hoai Niem</h1>
                <p class="subtitle">Choose your character</p>
                <div class="character-choices">
                    <button class="choice-btn" data-character="hoai">
                        <div class="choice-icon">👨</div>
                        <h3>Play as Hoai</h3>
                        <p>Male protagonist</p>
                    </button>
                    <button class="choice-btn" data-character="niem">
                        <div class="choice-icon">👩</div>
                        <h3>Play as Niem</h3>
                        <p>Female protagonist</p>
                    </button>
                </div>
            </div>
        </div>

        <!-- Main Game Screen -->
        <div id="game-screen" class="screen hidden">
            <!-- Rendering Layers (bottom to top) -->
            
            <!-- Layer 1: Background -->
            <div id="background-layer" class="layer background-layer"></div>
            
            <!-- Layer 2: Characters -->
            <div id="character-layer" class="layer character-layer">
                <div id="char-left" class="character-slot left"></div>
                <div id="char-center" class="character-slot center"></div>
                <div id="char-right" class="character-slot right"></div>
            </div>
            
            <!-- Layer 3: Effects -->
            <div id="effects-layer" class="layer effects-layer"></div>
            
            <!-- Layer 4: UI -->
            <div id="ui-layer" class="layer ui-layer">
                <!-- Menu Button -->
                <button id="menu-btn" class="menu-button">☰</button>
                
                <!-- Game Menu -->
                <div id="game-menu" class="game-menu hidden">
                    <div class="menu-content">
                        <h2>Menu</h2>
                        <button id="menu-resume" class="menu-item">Resume</button>
                        <button id="menu-save" class="menu-item">Save Game</button>
                        <button id="menu-load" class="menu-item">Load Game</button>
                        <button id="menu-title" class="menu-item">Return to Title</button>
                    </div>
                </div>
                
                <!-- Save/Load Menu -->
                <div id="save-load-menu" class="save-load-menu hidden">
                    <div class="menu-content">
                        <h2 id="save-load-title">Save Game</h2>
                        <div id="save-slots" class="save-slots">
                            <div class="save-slot" data-slot="1">
                                <span class="slot-number">Slot 1</span>
                                <span class="slot-info">Empty</span>
                            </div>
                            <div class="save-slot" data-slot="2">
                                <span class="slot-number">Slot 2</span>
                                <span class="slot-info">Empty</span>
                            </div>
                            <div class="save-slot" data-slot="3">
                                <span class="slot-number">Slot 3</span>
                                <span class="slot-info">Empty</span>
                            </div>
                        </div>
                        <button id="save-load-back" class="menu-item">Back</button>
                    </div>
                </div>
            </div>
            
            <!-- Layer 5: Dialogue Box -->
            <div id="dialogue-layer" class="layer dialogue-layer">
                <div id="dialogue-box" class="dialogue-box">
                    <div id="speaker-name" class="speaker-name"></div>
                    <div id="dialogue-text" class="dialogue-text"></div>
                    <div id="continue-indicator" class="continue-indicator">▼</div>
                </div>
                
                <!-- Choice Container -->
                <div id="choice-container" class="choice-container hidden"></div>
            </div>
        </div>

        <!-- Mini-Game Overlay -->
        <div id="minigame-overlay" class="minigame-overlay hidden">
            <button id="minigame-close" class="minigame-close-btn">✕ Return to Story</button>
            <iframe id="minigame-frame" class="minigame-frame"></iframe>
        </div>

        <!-- Loading Screen -->
        <div id="loading-screen" class="screen hidden">
            <div class="loading-content">
                <div class="spinner"></div>
                <p>Loading...</p>
            </div>
        </div>
    </div>

    <!-- Engine Scripts -->
    <script src="engine/save_system.js"></script>
    <script src="engine/character_manager.js"></script>
    <script src="engine/scene_manager.js"></script>
    <script src="engine/dialogue_manager.js"></script>
    <script src="engine/minigame_loader.js"></script>
    <script src="engine/vn_engine.js"></script>
</body>
</html>
